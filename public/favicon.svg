<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="funnel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="55%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>

  <!-- Cloud at top: layered ellipses for a fluffier silhouette -->
  <ellipse cx="20" cy="14" rx="11" ry="6" fill="url(#cloud)"/>
  <ellipse cx="44" cy="13" rx="13" ry="6" fill="url(#cloud)"/>
  <ellipse cx="32" cy="11" rx="14" ry="5" fill="#94a3b8"/>

  <!-- Funnel: tapers from wide-cloud to a point near the bottom -->
  <path d="M14 16
           Q20 28 26 40
           Q30 50 32 58
           Q34 50 38 40
           Q44 28 50 16
           Z"
        fill="url(#funnel)"/>

  <!-- Horizontal rotation bands -->
  <ellipse cx="32" cy="22" rx="14" ry="1.6" fill="#0f172a" opacity="0.35"/>
  <ellipse cx="32" cy="30" rx="11" ry="1.4" fill="#0f172a" opacity="0.35"/>
  <ellipse cx="32" cy="38" rx="8"  ry="1.2" fill="#0f172a" opacity="0.35"/>
  <ellipse cx="32" cy="46" rx="5"  ry="1"   fill="#0f172a" opacity="0.35"/>

  <!-- Subtle red tip to reinforce "tornado/warning" -->
  <ellipse cx="32" cy="56" rx="2" ry="1.8" fill="#ef4444" opacity="0.85"/>
</svg>
