<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self';
             style-src 'self' https://unpkg.com 'unsafe-inline';
             img-src 'self' data: https://*.tile.openstreetmap.org;
             font-src 'self' data: https://unpkg.com;
             connect-src 'self' https://api.weather.gov;
             worker-src 'self';
             frame-ancestors 'none';
             base-uri 'self';
             form-action 'self'" />
  <title>TornadoTracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />
  <link rel="stylesheet" href="./styles/variables.css" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="./styles/feed.css" />
  <link rel="stylesheet" href="./styles/detail.css" />
  <link rel="stylesheet" href="./styles/map.css" />
  <link rel="stylesheet" href="./styles/mobile.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header" id="app-header"></header>

    <!-- Stats bar -->
    <div class="stats-bar" id="stats-bar" aria-live="polite"></div>

    <!-- Sidebar: feed + search -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar__tabs" role="tablist">
        <button class="sidebar__tab sidebar__tab--active" data-tab="feed" role="tab" aria-selected="true">Feed</button>
        <button class="sidebar__tab" data-tab="search" role="tab" aria-selected="false">Search</button>
      </div>
      <div class="sidebar__content" id="sidebar-content">
        <div id="feed-container"></div>
        <div id="search-container" class="hidden"></div>
      </div>
    </div>

    <!-- Main panel: map + detail -->
    <div class="main-panel" id="main-panel">
      <div id="map-panel-wrapper" class="main-panel__map-wrapper">
        <div id="map-panel" class="main-panel__map"></div>
      </div>
      <div class="main-panel__detail" id="detail-panel"></div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
